// Hiển thị GeoJSON
//==================================================

var layer = L.geoJSON(geojsonData,{

    style:function(feature){

        return{

            color:"#ff0000",
            weight:2,
            fillColor:"#00ff00",
            fillOpacity:0.4

        };

    },

    onEachFeature:function(feature,layer){

        var txt="";

        for(var key in feature.properties){

            txt += "<b>"+key+"</b>: "
                + feature.properties[key]
                + "<br>";

        }



// thay pop up 2


       layer.bindPopup(
    '<div class="popup-title">📍 Thông tin</div>' + txt
);





// ket thuc thay pop up 2



    }

}).addTo(map);

// Zoom tới layer
map.fitBounds(layer.getBounds());

//=========================================
// HIỂN THỊ VỊ TRÍ HIỆN TẠI
//=========================================

map.locate({
    setView: true,
    maxZoom: 18
});

function onLocationFound(e) {

    L.circleMarker(e.latlng, {
        radius:8,
        color:"#0d6efd",
        fillColor:"#0d6efd",
        fillOpacity:0.8
    }).addTo(map)
    .bindPopup("📍 Bạn đang ở đây")
    .openPopup();

}

function onLocationError(e) {

    alert("Không lấy được vị trí.\nHãy bật GPS và cho phép truy cập vị trí.");

}

map.on("locationfound", onLocationFound);

map.on("locationerror", onLocationError);



L.control.layers(
    {
        "🛰️ Ảnh vệ tinh": satellite,
        "🗺️ Đường phố": osm
    },
    {
        "🌳 Lớp dữ liệu": layer
    },
    {
        collapsed:false
    }
).addTo(map);
